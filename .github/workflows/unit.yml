name: Unit Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run setup
        run: bash setup.sh

      - name: Run unit tests
        run: |
          source activate.sh
          pytest tests/unit -v
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
