name: Unit Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache Linux kernel
        uses: actions/cache@v4
        id: kernel-cache
        with:
          path: workspace/kernel
          key: linux-v6.19

      - name: Clone Linux kernel
        if: steps.kernel-cache.outputs.cache-hit != 'true'
        run: git clone --depth=1 --branch v6.19 https://git.kernel.org/pub/scm/linux/kernel/git/torvalds/linux.git workspace/kernel

      - name: Run unit tests
        run: pytest tests/unit -v
        env:
          KERNEL_SRC: ${{ github.workspace }}/workspace/kernel
