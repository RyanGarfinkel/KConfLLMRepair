name: Integration Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run setup
        run: bash setup.sh

      - name: Run integration tests
        run: |
          source activate.sh
          pytest tests/integration -v
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
