name: Integration Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Linux kernel
        uses: actions/cache@v4
        id: kernel-cache
        with:
          path: workspace/kernel
          key: linux-v6.19

      - name: Clone Linux kernel
        if: steps.kernel-cache.outputs.cache-hit != 'true'
        run: git clone --depth=1 --branch v6.19 https://git.kernel.org/pub/scm/linux/kernel/git/torvalds/linux.git workspace/kernel

      - name: Run setup
        run: bash setup.sh

      - name: Run integration tests
        run: |
          source activate.sh
          pytest tests/integration -v
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
