name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docker:
              - Dockerfile
              - requirements.txt

  build-image:
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/ryangarfinkel/kconfllmrepair:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  lint:
    needs: [changes, build-image]
    if: always()
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ryangarfinkel/kconfllmrepair:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Run pylint
        run: pylint src/ --fail-under=9.75

  test:
    needs: [build-image, lint]
    if: |
      always() &&
      needs.lint.result == 'success' &&
      (needs.build-image.result == 'success' || needs.build-image.result == 'skipped')
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ryangarfinkel/kconfllmrepair:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Run unit tests
        run: pytest tests/unit/
        env:
          GOOGLE_API_KEY: fake-key-for-ci
